<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #09090b 0%, #1e1b4b 100%);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 5rem 7rem;
            border-radius: 30px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: fadeIn 1.2s ease-out forwards;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 50px 0 rgba(168, 85, 247, 0.15);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        h1 {
            color: #d8b4fe;
            font-size: 5.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            background: linear-gradient(to right, #f3e8ff, #d8b4fe, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Decorative glowing circles behind */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.5;
            animation: float 12s infinite ease-in-out alternate;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 15%;
            background: linear-gradient(to right, #7e22ce 0%, #c084fc 100%);
        }

        .circle-2 {
            width: 500px;
            height: 500px;
            bottom: 5%;
            right: 10%;
            background: linear-gradient(to right, #4c1d95 0%, #db2777 100%);
            animation-delay: -6s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -60px) scale(1.1); }
            100% { transform: translate(-30px, 30px) scale(0.9); }
        }
    </style>
</head>
<body>
    <div class="glow-circle circle-1"></div>
    <div class="glow-circle circle-2"></div>
    
    <div class="card">
        <h1>내 첫 번째 아이디어</h1>
    </div>
</body>
</html>
